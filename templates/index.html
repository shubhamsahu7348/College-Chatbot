<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MahaCollege AI Counselor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .typing-indicator span {
            animation: blink 1.4s infinite both;
            height: 6px; width: 6px; background: #3B82F6; border-radius: 50%; display: inline-block; margin: 0 1px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
        
        .chat-btn {
            background: #ffffff; border: 1px solid #e2e8f0; color: #3b82f6;
            padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s; display: inline-block; margin: 6px 6px 0 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .chat-btn:hover { background: #eff6ff; border-color: #bfdbfe; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex overflow-hidden">

    <!-- Sidebar Dashboard -->
    <aside class="w-64 bg-white border-r border-slate-200 flex-col hidden md:flex">
        <div class="p-6 border-b border-slate-100 flex items-center gap-3">
            <div class="bg-blue-600 text-white p-2 rounded-lg"><i class="fa-solid fa-graduation-cap"></i></div>
            <h1 class="font-bold text-slate-800 text-lg leading-tight">MahaCollege<br><span class="text-blue-600 text-sm font-medium">Admission AI</span></h1>
        </div>
        
        <div class="p-4 flex-1 overflow-y-auto">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Quick Actions</p>
            <div class="space-y-2">
                <button onclick="quickReply('Top 10 MCA Colleges')" class="w-full text-left px-4 py-3 rounded-lg bg-slate-50 hover:bg-blue-50 text-slate-700 hover:text-blue-700 transition flex items-center gap-3 text-sm font-medium">
                    <i class="fa-solid fa-trophy text-blue-500 w-4"></i> Top 10 Colleges
                </button>
                <button onclick="quickReply('Admission Process of PCCOE')" class="w-full text-left px-4 py-3 rounded-lg bg-slate-50 hover:bg-blue-50 text-slate-700 hover:text-blue-700 transition flex items-center gap-3 text-sm font-medium">
                    <i class="fa-solid fa-file-signature text-purple-500 w-4"></i> Admission Process
                </button>
            </div>
        </div>

        <div class="p-4 border-t border-slate-100">
            <button onclick="resetChat()" class="w-full py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-rotate-left"></i> Reset Session
            </button>
        </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="flex-1 flex flex-col relative bg-[#f8fafc]">
        
        <!-- Mobile Header -->
        <header class="md:hidden bg-white border-b border-slate-200 p-4 flex items-center justify-between shadow-sm z-10">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 text-white p-1.5 rounded-md text-xs"><i class="fa-solid fa-graduation-cap"></i></div>
                <h1 class="font-bold text-slate-800">MahaCollege AI</h1>
            </div>
            <button onclick="resetChat()" class="text-slate-500 hover:text-blue-600"><i class="fa-solid fa-rotate-left"></i></button>
        </header>

        <!-- Chat History -->
        <div id="chat-box" class="flex-1 overflow-y-auto chat-scroll p-4 md:p-6 space-y-6">
            <!-- Messages appended here -->
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-white border-t border-slate-200">
            <form id="chat-form" class="max-w-4xl mx-auto relative flex items-center">
                <input type="text" id="user-input" class="w-full bg-slate-100 border border-slate-200 text-slate-800 rounded-xl pl-5 pr-14 py-3.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition text-sm sm:text-base shadow-inner" placeholder="Ask about colleges, fees, cutoffs, placements..." autocomplete="off">
                <button type="submit" class="absolute right-2 bg-blue-600 text-white rounded-lg h-10 w-10 flex items-center justify-center hover:bg-blue-700 transition shadow">
                    <i class="fa-solid fa-paper-plane text-sm"></i>
                </button>
            </form>
            <div class="max-w-4xl mx-auto text-center mt-2">
                <p class="text-[10px] text-slate-400">Powered by Local Intelligent Engine. Fast & Secure.</p>
            </div>
        </div>
    </main>

    <!-- INTELLIGENT LOGIC & DATABASE (NO BACKEND NEEDED) -->
    <script>
        const chatBox = document.getElementById('chat-box');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');

        window.addEventListener('load', () => sendToBot('hi', false));

        function resetChat() {
            chatBox.innerHTML = '';
            fetch('/clear', { method: 'POST' });
            sendToBot('hi', false);
        }

        function appendMessage(sender, text, buttons = []) {
            const div = document.createElement('div');
            div.className = `flex items-end gap-3 max-w-[95%] md:max-w-[85%] ${sender === 'user' ? 'ml-auto flex-row-reverse' : ''}`;

            const icon = sender === 'user'
                ? ''
                : `<div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0 text-blue-600 shadow-sm border border-blue-200"><i class="fa-solid fa-robot"></i></div>`;

            const bubbleClass = sender === 'user'
                ? `bg-blue-600 text-white px-5 py-3.5 rounded-2xl rounded-br-none shadow-md text-sm md:text-base`
                : `bg-white px-5 py-4 rounded-2xl rounded-bl-none shadow-sm border border-slate-200 text-slate-700 text-sm md:text-base leading-relaxed w-full`;

            let htmlContent = `<div class="${bubbleClass}">${text}</div>`;
            if (buttons && buttons.length > 0 && sender !== 'user') {
                let btnHtml = `<div class="mt-3 flex flex-wrap gap-2">`;
                buttons.forEach(btn => {
                    btnHtml += `<button class="chat-btn" onclick="quickReply('${btn}')">${btn}</button>`;
                });
                btnHtml += `</div>`;
                htmlContent = `<div class="flex flex-col w-full">${htmlContent}${btnHtml}</div>`;
            }

            div.innerHTML = `${icon}${htmlContent}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = `flex items-end gap-3 max-w-[85%]`;
            div.innerHTML = `
                <div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0 text-blue-600 shadow-sm border border-blue-200">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="bg-white px-5 py-4 rounded-2xl rounded-bl-none shadow-sm border border-slate-200 typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function quickReply(text) {
            input.value = text;
            form.dispatchEvent(new Event('submit'));
        }

        async function requestBot(message) {
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message }),
            });
            if (!response.ok) {
                return { reply: 'Sorry, there was a problem processing your request. Please try again.' };
            }
            return await response.json();
        }

        async function sendToBot(msg, displayUser = true) {
            if (displayUser) appendMessage('user', msg);
            const typingId = showTyping();
            const response = await requestBot(msg);
            const typingElement = document.getElementById(typingId);
            if (typingElement) typingElement.remove();
            appendMessage('bot', response.reply || 'Sorry, I could not generate a response.', response.buttons || []);
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            sendToBot(msg, true);
        });
    </script>
